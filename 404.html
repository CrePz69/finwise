<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — FinWise Egypt</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0c10;color:#edeae4;font-family:'Instrument Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .wrap{text-align:center;max-width:440px;}
    .code{font-family:'Syne',sans-serif;font-size:96px;font-weight:800;color:#b8f050;letter-spacing:-4px;line-height:1;}
    .title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin:16px 0 10px;}
    .sub{color:#9199ad;font-size:15px;line-height:1.7;margin-bottom:32px;}
    .btn{display:inline-block;background:#b8f050;color:#0a0c10;padding:13px 28px;border-radius:10px;text-decoration:none;font-weight:700;font-family:'Syne',sans-serif;font-size:15px;transition:opacity .2s;}
    .btn:hover{opacity:.85;}
    .emoji{font-size:48px;margin-bottom:16px;display:block;}
  </style>
</head>
<body>
  <div class="wrap">
    <span class="emoji">💸</span>
    <div class="code">404</div>
    <div class="title">Page Not Found</div>
    <p class="sub">Looks like this page took your money and ran.<br>Let's get you back to managing your finances.</p>
    <a href="index.html" class="btn">← Back to FinWise</a>
  </div>
</body>
</html>
